<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <title>To do list</title>
</head>

<body>
    <main>

        <div class="heading">
            <h1>My To-Do List</h1>
            <p class="para">Stay organized and get things done</p>
        </div>
        <div class="inpbox">
            <input id="inp" type="text" placeholder="Enter task name...">
            <button id="btn">
                <p class="plus">+</p>
                <p>Add</p>
            </button>
        </div>
        <div class="linee"></div>
        <div class="subhead">Tasks</div>

        <div class="jstsk">

            <p id="pent">No pending Task</p>

             
        </div>



    </main>
    <script src="main.js"></script>
</body>

</html>
